custom_proxy_group=🔀 非标端口`select`[]🐟 遵循规则`[]DIRECT
custom_proxy_group=🐟 遵循规则`select`[]🐟 漏网之鱼

; 节点组
custom_proxy_group=🧭 手动选择`select`.*

custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇭🇰 HK`url-test`(?i)(🇭🇰|香港|HK-|hk-|Hysteria|HY2)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 TW`url-test`(?i)(🇹🇼|台湾|TW-|tw-|Tuic|Taiwan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 JP`url-test`(?i)(🇯🇵|日本|JP-|jp-|Hysteria|HY2)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 SG`url-test`(?i)(🇸🇬|新加坡|SG-|sg-|Hysteria|HY2)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 US`url-test`(?i)(🇺🇸|美国|US-|us-|Hysteria|HY2)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🧊 冷门节点`select`.*
